    <!-- Dynamic Favicon Badge -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%231e293b'/><text x='50' y='55' font-family='sans-serif' font-weight='bold' font-size='40' fill='%2338bdf8' dominant-baseline='middle' text-anchor='middle'>VK</text></svg>">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Fixed Navigation Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 76px;
            background-color: #1e293b; /* Slate 800 */
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .profile-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background-color: #38bdf8; /* Cyan 400 */
            color: #0f172a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .meta h1 {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .meta p {
            font-size: 13px;
            color: #94a3b8;
        }

        /* Right Side Navigation Actions */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .social-links {
            display: flex;
            gap: 16px;
        }

        .social-links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .social-links a:hover {
            color: #38bdf8;
        }

        .btn-download {
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }

        /* Main Workspace Container */
        .workspace {
            flex: 1;
            margin-top: 76px;
            width: 100%;
            height: calc(100vh - 76px);
            position: relative;
            background-color: #0f172a;
        }

        /* Mobile Fallback View (Hidden beneath working embeds) */
        .mobile-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1;
        }

        .fallback-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px 24px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .fallback-card h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .fallback-card p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Interactive Document Frame */
        iframe {
            position: relative;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 5; /* Sits completely over fallback on desktop engines */
            background-color: #0f172a;
        }
    </style>
</head>
<body>

    <header>
        <div class="profile-group">
            <div class="avatar">VK</div>
            <div class="meta">
                <h1>Vivek Kasadwar</h1>
            </div>
        </div>
        
        <div class="nav-actions">
            <nav class="social-links">
                <a href="https://www.linkedin.com/in/vivek-kasadwar" target="_blank">LinkedIn</a>
            </nav>

            <a href="resume.pdf" 
               download="Vivek-Kasadwar-Resume.pdf" 
               class="btn-download"
               onclick="if(window.gtag){gtag('event', 'file_download', {'file_name': 'Vivek-Kasadwar-Resume.pdf', 'button_location': 'header'});}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Resume
            </a>
        </div>
    </header>

    <div class="workspace">
        
        <div class="mobile-fallback">
            <div class="fallback-card">
                <h2>Curriculum Vitae</h2>
                <p>Your browser or device does not support inline document previews. You can access the document safely using the buttons below.</p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="resume.pdf" 
                       target="_blank" 
                       class="btn-download" 
                       style="background-color: transparent; border: 1px solid #475569; color: #cbd5e1; justify-content: center;"
                       onclick="if(window.gtag){gtag('event', 'view_resume_direct', {'file_name': 'resume.pdf', 'button_location': 'mobile_fallback'});}">
                        View PDF Directly
                    </a>
                    <a href="resume.pdf" 
                       download="Vivek-Kasadwar-Resume.pdf" 
                       class="btn-download" 
                       style="justify-content: center;"
                       onclick="if(window.gtag){gtag('event', 'file_download', {'file_name': 'Vivek-Kasadwar-Resume.pdf', 'button_location': 'mobile_fallback'});}">
                        Download PDF File
                    </a>
                </div>
            </div>
        </div>

        <iframe src="resume.pdf" type="application/pdf"></iframe>

    </div>

</body>
</html>
